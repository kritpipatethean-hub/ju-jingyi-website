<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search)
        const redirectPath = params.get('p')

        if (!redirectPath) return

        const nextSearch = params.get('q')
        const nextHash = params.get('h')
        const basePath = window.location.pathname.replace(/\/$/, '')
        const normalizedPath = redirectPath.startsWith('/') ? redirectPath : `/${redirectPath}`
        const nextUrl =
          `${basePath}${normalizedPath}` +
          (nextSearch ? `?${nextSearch}` : '') +
          (nextHash ? `#${nextHash}` : '')

        window.history.replaceState(null, '', nextUrl)
      })()
    </script>
    <link rel="icon" href="%BASE_URL%images/closeup-pink.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chinese Stars Fan Hub | แฟนฮับดาราจีน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
